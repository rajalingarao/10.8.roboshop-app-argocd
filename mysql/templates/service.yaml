apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    app: mysql
    project: roboshop
    tier: db
spec:
  ports:
  - protocol: TCP
    port: 3306 #service-port
    targetPort: 3306
  clusterIP: None
  selector:
    app: mysql
    project: roboshop
    tier: db

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-sc
provisioner: ebs.csi.aws.com
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer